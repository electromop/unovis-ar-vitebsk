<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>УНОВИС × Витебск — AR</title>

  <!-- A-Frame 1.3.0 — официально поддерживаемая MindAR 1.2.5 версия -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- MindAR image tracking (A-Frame build) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      /* background НЕ задаём — иначе перекрывает видео камеры,
         которое MindAR вставляет с z-index: -2 */
      font-family: 'Courier New', monospace;
      color: #f2ede3;
    }

    /* Оверлеи поверх AR-сцены */
    #start-screen, #scan-hint, #detected-banner {
      z-index: 9999;
    }

    /* Стартовый экран */
    #start-screen {
      position: fixed; inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 32px;
      text-align: center;
    }
    #start-screen h1 {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 56px;
      margin: 0 0 8px;
      letter-spacing: 4px;
      color: #f2ede3;
    }
    #start-screen .accent { color: #d8301a; }
    #start-screen .sub {
      font-size: 13px;
      letter-spacing: 6px;
      opacity: 0.7;
      margin-bottom: 40px;
    }
    #start-screen p {
      font-size: 15px;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 0 32px;
      opacity: 0.85;
    }
    #start-btn {
      background: #d8301a;
      color: #f2ede3;
      border: none;
      padding: 18px 42px;
      font-family: Impact, sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 0;
    }
    #start-btn:active { transform: translate(2px, 2px); }

    /* Полоски-акценты */
    .stripes {
      position: absolute;
      top: 24px; right: 24px;
      display: flex; gap: 6px;
    }
    .stripes div { width: 22px; height: 22px; }
    .s1 { background: #111111; border: 1px solid #f2ede3; }
    .s2 { background: #d8301a; }
    .s3 { background: #0b3d91; }

    /* Подсказка сканирования */
    #scan-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17,17,17,0.75);
      color: #f2ede3;
      padding: 10px 18px;
      font-size: 13px;
      letter-spacing: 3px;
      border-left: 3px solid #d8301a;
      z-index: 500;
      display: none;
    }

    /* Статус при обнаружении */
    #detected-banner {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #d8301a;
      color: #f2ede3;
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 3px;
      z-index: 500;
      display: none;
    }

  </style>
</head>
<body>

  <!-- Старт -->
  <div id="start-screen">
    <div class="stripes"><div class="s1"></div><div class="s2"></div><div class="s3"></div></div>
    <h1>УНОВИС<span class="accent">.</span></h1>
    <div class="sub">ВИТЕБСК · 1919—1922</div>
    <p>Наведи камеру на плакат<br>и увидишь, как супрематизм оживает<br>спустя 100 лет.</p>
    <button id="start-btn">НАЧАТЬ AR →</button>
    <p style="font-size:11px; opacity:0.5; margin-top:32px; letter-spacing:2px;">
      Требуется доступ к камере<br>Работает в Safari / Chrome на телефоне
    </p>
  </div>

  <div id="scan-hint">НАВЕДИ · КАМЕРУ · НА · ПЛАКАТ</div>
  <div id="detected-banner">● AR АКТИВЕН</div>

  <!-- A-Frame сцена с MindAR -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.00001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 10;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights, alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Локальные ресурсы можно положить сюда -->
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Свет — принудительно, чтобы материалы светились одинаково с любых углов -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 1.2"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="1 1 1"></a-entity>

    <!-- Цель 0: наш плакат -->
    <a-entity mindar-image-target="targetIndex: 0" id="target">

      <!-- Парящий красный квадрат — классика Малевича — широкий дрейф + wobble вращения + дыхание -->
      <a-plane
        id="red-square"
        position="0.25 0.15 0.05"
        width="0.28" height="0.28"
        rotation="0 0 10"
        material="shader: flat; color: #d8301a; side: double"
        animation__rot="property: rotation; from: 0 0 -8; to: 0 0 22; dir: alternate; loop: true; dur: 5500; easing: easeInOutSine"
        animation__float="property: position; from: 0.18 0.08 0.05; to: 0.32 0.22 0.05; dir: alternate; loop: true; dur: 5000; easing: easeInOutSine"
        animation__breathe="property: scale; from: 1 1 1; to: 1.08 1.08 1; dir: alternate; loop: true; dur: 3200; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; easing: easeOutCubic">
      </a-plane>

      <!-- Чёрный круг — крупный дрейф по диагонали -->
      <a-circle
        id="black-disc"
        position="-0.3 -0.05 0.03"
        radius="0.13"
        material="shader: flat; color: #111111; side: double"
        animation__float="property: position; from: -0.38 -0.14 0.03; to: -0.22 0.04 0.03; dir: alternate; loop: true; dur: 5500; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1100; delay: 200; easing: easeOutCubic">
      </a-circle>

      <!-- Белое кольцо внутри круга — идёт синхронно с чёрным -->
      <a-circle
        position="-0.3 -0.05 0.04"
        radius="0.06"
        material="shader: flat; color: #f2ede3; side: double"
        animation__float="property: position; from: -0.38 -0.14 0.04; to: -0.22 0.04 0.04; dir: alternate; loop: true; dur: 5500; easing: easeInOutSine"
        animation__pulse="property: scale; from: 0.85 0.85 1; to: 1.15 1.15 1; dir: alternate; loop: true; dur: 2600; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1100; delay: 350; easing: easeOutCubic">
      </a-circle>

      <!-- Синий треугольник — активное вращение + дрейф -->
      <a-triangle
        id="blue-tri"
        position="0.2 -0.3 0.04"
        vertex-a="0 0.18 0"
        vertex-b="-0.16 -0.09 0"
        vertex-c="0.16 -0.09 0"
        rotation="0 0 -20"
        material="shader: flat; color: #0b3d91; side: double"
        animation__rot="property: rotation; to: 0 0 340; loop: true; dur: 16000; easing: linear"
        animation__float="property: position; from: 0.12 -0.38 0.04; to: 0.28 -0.22 0.04; dir: alternate; loop: true; dur: 5800; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; delay: 500; easing: easeOutCubic">
      </a-triangle>

      <!-- Жёлтый брусок — дрейф + покачивание угла -->
      <a-plane
        position="0 0.35 0.02"
        width="0.5" height="0.04"
        rotation="0 0 6"
        material="shader: flat; color: #f2b705; side: double"
        animation__rot="property: rotation; from: 0 0 -2; to: 0 0 12; dir: alternate; loop: true; dur: 6200; easing: easeInOutSine"
        animation__float="property: position; from: -0.06 0.31 0.02; to: 0.06 0.39 0.02; dir: alternate; loop: true; dur: 5600; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 900; delay: 700; easing: easeOutCubic">
      </a-plane>

      <!-- Красная диагональная полоса — горизонтальный дрейф -->
      <a-plane
        position="0 -0.45 0.01"
        width="0.95" height="0.018"
        rotation="0 0 -6"
        material="shader: flat; color: #d8301a; side: double"
        animation__rot="property: rotation; from: 0 0 -10; to: 0 0 -2; dir: alternate; loop: true; dur: 7400; easing: easeInOutSine"
        animation__float="property: position; from: -0.07 -0.47 0.01; to: 0.07 -0.43 0.01; dir: alternate; loop: true; dur: 6000; easing: easeInOutSine"
        animation__in="property: scale; from: 0 1 1; to: 1 1 1; dur: 1200; delay: 900; easing: easeOutCubic">
      </a-plane>

      <!-- Чёрный вертикальный брусок — дрейф + наклон -->
      <a-plane
        position="0.42 -0.3 0.02"
        width="0.015" height="0.3"
        rotation="0 0 0"
        material="shader: flat; color: #111111; side: double"
        animation__rot="property: rotation; from: 0 0 -6; to: 0 0 6; dir: alternate; loop: true; dur: 5400; easing: easeInOutSine"
        animation__float="property: position; from: 0.38 -0.36 0.02; to: 0.46 -0.24 0.02; dir: alternate; loop: true; dur: 5200; easing: easeInOutSine"
        animation__in="property: scale; from: 1 0 1; to: 1 1 1; dur: 900; delay: 1100; easing: easeOutCubic">
      </a-plane>

      <!-- Маленький красный круг — пульсация + широкая орбита -->
      <a-circle
        position="-0.38 -0.4 0.03"
        radius="0.035"
        material="shader: flat; color: #d8301a; side: double"
        animation__pulse="property: scale; dir: alternate; from: 0.85 0.85 1; to: 1.55 1.55 1; loop: true; dur: 1800; easing: easeInOutSine"
        animation__float="property: position; from: -0.44 -0.46 0.03; to: -0.32 -0.34 0.03; dir: alternate; loop: true; dur: 4800; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 900; delay: 1300; easing: easeOutCubic">
      </a-circle>

      <!-- Текст "УНОВИС" парящий над плакатом — более заметный свинг -->
      <a-text
        value="УНОВИС"
        position="0 0.5 0.08"
        align="center"
        color="#d8301a"
        width="1.6"
        font="kelsonsans"
        animation__float="property: position; from: -0.06 0.47 0.08; to: 0.06 0.53 0.08; dir: alternate; loop: true; dur: 5400; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; delay: 1500; easing: easeOutCubic">
      </a-text>

      <a-text
        value="VITEBSK 1919-1922"
        position="0 0.38 0.08"
        align="center"
        color="#f2ede3"
        width="1.2"
        font="kelsonsans"
        animation__float="property: position; from: -0.03 0.37 0.08; to: 0.03 0.39 0.08; dir: alternate; loop: true; dur: 6400; easing: easeInOutSine"
        animation__in="property: opacity; from: 0; to: 1; dur: 1200; delay: 1900; easing: easeInOutSine">
      </a-text>

      <!-- Маленькие парящие квадратики-"спутники" — сильнее вращаются и дрейфуют -->
      <a-plane position="0.45 0.4 0.04" width="0.04" height="0.04"
        material="shader: flat; color: #111111; side: double"
        animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 9000; easing: linear"
        animation__float="property: position; from: 0.38 0.34 0.04; to: 0.5 0.46 0.04; dir: alternate; loop: true; dur: 4600; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; delay: 1700; easing: easeOutCubic">
      </a-plane>

      <a-plane position="-0.45 0.3 0.04" width="0.03" height="0.03"
        material="shader: flat; color: #d8301a; side: double"
        animation__rot="property: rotation; to: 0 0 -360; loop: true; dur: 11000; easing: linear"
        animation__float="property: position; from: -0.5 0.24 0.04; to: -0.4 0.36 0.04; dir: alternate; loop: true; dur: 5000; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; delay: 1800; easing: easeOutCubic">
      </a-plane>

      <!-- Крест-архитектон (плоский плюс) — вращается быстрее, дрейфует шире -->
      <a-entity position="-0.15 0.25 0.06"
        animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 12000; easing: linear"
        animation__float="property: position; from: -0.22 0.19 0.06; to: -0.08 0.31 0.06; dir: alternate; loop: true; dur: 5600; easing: easeInOutSine"
        animation__in="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; delay: 2000; easing: easeOutCubic">
        <a-plane width="0.12" height="0.02" material="shader: flat; color: #111111; side: double"></a-plane>
        <a-plane width="0.02" height="0.12" material="shader: flat; color: #d8301a; side: double"></a-plane>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const scanHint = document.getElementById('scan-hint');
    const banner = document.getElementById('detected-banner');
    const sceneEl = document.querySelector('a-scene');

    // Глобальные обработчики MindAR
    sceneEl.addEventListener('arReady', () => {
      console.log('MindAR готов');
    });
    sceneEl.addEventListener('arError', (e) => {
      console.error('MindAR error', e);
      alert('Не удалось запустить AR.\n\nПроверь:\n1. Сайт открыт по https:// или localhost\n2. Браузер получил доступ к камере\n3. Файл targets.mind лежит рядом с ar.html');
    });

    // Таргет-события
    const target = document.querySelector('#target');
    target.addEventListener('targetFound', () => {
      scanHint.style.display = 'none';
      banner.style.display = 'block';
    });
    target.addEventListener('targetLost', () => {
      banner.style.display = 'none';
      scanHint.style.display = 'block';
    });

    // Старт по нажатию — важно для iOS Safari (нужен user gesture для камеры)
    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      scanHint.style.display = 'block';

      const begin = () => {
        const arSystem = sceneEl.systems['mindar-image-system'];
        if (!arSystem) {
          alert('MindAR не инициализирован. Перезагрузи страницу.');
          return;
        }
        try {
          const result = arSystem.start();
          // В разных версиях MindAR start() может или возвращать Promise, или нет
          if (result && typeof result.then === 'function') {
            result.catch(err => {
              console.error(err);
              alert('Не удалось запустить камеру: ' + (err && err.message ? err.message : err));
            });
          }
        } catch (err) {
          console.error(err);
          alert('Ошибка запуска AR: ' + (err && err.message ? err.message : err));
        }
      };

      if (sceneEl.hasLoaded) {
        begin();
      } else {
        sceneEl.addEventListener('loaded', begin, { once: true });
      }
    });
  </script>
</body>
</html>
